<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plant Disease Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
        }

        form {
            margin-top: 20px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }

        .result {
            margin-top: 30px;
        }

        img {
            max-width: 300px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Plant Disease Detection</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="image">Select a leaf image:</label><br>
        <input type="file" name="image" accept="image/*" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
    <div class="result">
        <h2>Prediction: {{ result }}</h2>
        <img src="{{ image_url }}" alt="Uploaded Image">
    </div>
    {% endif %}
</body>
</html>
