<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 5px;
        }
        .result-text {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Plant Disease Detection Result</h2>

        {% if result %}
            <p class="result-text">Prediction: {{ result }}</p>
        {% else %}
            <p class="result-text">No prediction available</p>
        {% endif %}

        {% if image_url %}
            <img src="{{ image_url }}" alt="Uploaded Image">
        {% endif %}

        <br><br>
        <a href="/">Upload Another Image</a>
    </div>
</body>
</html>
